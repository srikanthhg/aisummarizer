apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  finalizers:
  - resource-finalizer.argocd.argoproj.io
spec:
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  - group: apps
    kind: Statefulset
    jsonPointers:
    - /spec/replicas 
  project: default
  source:
    helm:
    parameters:
    - name: "Replicas"
      value: 0
    repoURL: https://github.com/srikanthhg/aisummarizer.git
    targetRevision: main
    path: charts/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
