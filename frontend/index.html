<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Text Summarizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h2 { margin-top: 0; }
    input, textarea, select, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #2a5298;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #1e3c72; }
    .hidden { display: none; }
    .status { color: red; margin-top: 5px; }
    .result {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      white-space: pre-wrap;
    }
    .history-item {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- LOGIN -->
    <div id="loginSection">
      <h2>Login / Register</h2>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="registerUser()">Register</button>
      <button onclick="loginUser()">Login</button>
      <div id="authStatus" class="status"></div>
    </div>

    <!-- APP -->
    <div id="appSection" class="hidden">
      <h2>AI Text Summarizer</h2>

      <select id="summaryType">
        <option value="short">Short</option>
        <option value="detailed">Detailed</option>
        <option value="bullet">Bullet</option>
      </select>

      <button onclick="logout()">Logout</button>

      <h3>Text Input</h3>
      <textarea id="textInput" placeholder="Enter text..."></textarea>
      <button onclick="summarizeText()">Summarize Text</button>

      <h3>File Upload</h3>
      <input type="file" id="fileInput" />
      <button onclick="uploadFile()">Upload File</button>
      <div id="jobStatus" class="status"></div>

      <h3>Result</h3>
      <div id="result" class="result"></div>

      <h3>History</h3>
      <div id="history"></div>
    </div>

  </div>

<script>
let accessToken = localStorage.getItem("access_token");
let refreshToken = localStorage.getItem("refresh_token");

/* ---------- Helpers ---------- */

async function safeJson(res) {
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    return { detail: text };
  }
}

function parseJwt(token) {
  try {
    return JSON.parse(atob(token.split(".")[1]));
  } catch {
    return null;
  }
}

function getUsername() {
  const payload = parseJwt(accessToken);
  return payload?.sub;
}

function showApp() {
  document.getElementById("loginSection").classList.add("hidden");
  document.getElementById("appSection").classList.remove("hidden");
  loadHistory();
}

if (accessToken) showApp();

/* ---------- AUTH ---------- */

async function registerUser() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });

  const data = await safeJson(res);
  document.getElementById("authStatus").innerText =
    data.message || data.detail || "Register failed";
}

async function loginUser() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });

  const data = await safeJson(res);

  if (data.access_token) {
    accessToken = data.access_token;
    refreshToken = data.refresh_token;

    localStorage.setItem("access_token", accessToken);
    localStorage.setItem("refresh_token", refreshToken);

    showApp();
  } else {
    document.getElementById("authStatus").innerText =
      data.detail || "Login failed";
  }
}

async function refreshAccessToken() {
  if (!refreshToken) return false;

  const res = await fetch("/refresh", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({refresh_token: refreshToken})
  });

  const data = await safeJson(res);

  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem("access_token", accessToken);
    return true;
  }
  return false;
}

async function authFetch(url, options = {}) {
  options.headers = options.headers || {};
  if (accessToken) {
    options.headers["Authorization"] = "Bearer " + accessToken;
  }

  let res = await fetch(url, options);

  if (res.status === 401) {
    const ok = await refreshAccessToken();
    if (ok) {
      options.headers["Authorization"] = "Bearer " + accessToken;
      res = await fetch(url, options);
    }
  }
  return res;
}

async function logout() {
  await fetch("/logout", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({refresh_token: refreshToken})
  });

  localStorage.clear();
  location.reload();
}

/* ---------- FEATURES ---------- */

async function summarizeText() {
  const text = document.getElementById("textInput").value;
  const summary_type = document.getElementById("summaryType").value;

  const res = await authFetch("/summarize/text", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({text, summary_type})
  });

  const data = await safeJson(res);
  document.getElementById("result").innerText =
    data.summary || data.detail;
}

async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  const summary_type = document.getElementById("summaryType").value;

  const form = new FormData();
  form.append("file", file);
  form.append("summary_type", summary_type);

  const res = await authFetch("/summarize/file", {
    method: "POST",
    body: form
  });

  const data = await safeJson(res);

  if (!data.job_id) {
    document.getElementById("jobStatus").innerText = data.detail;
    return;
  }

  pollJob(data.job_id);
}

async function pollJob(id) {
  const interval = setInterval(async () => {
    const res = await authFetch("/jobs/" + id);
    const data = await safeJson(res);

    document.getElementById("jobStatus").innerText = data.status;

    if (data.status === "completed") {
      document.getElementById("result").innerText = data.summary;
      clearInterval(interval);
    }
  }, 3000);
}

async function loadHistory() {
  const user = getUsername();
  if (!user) return;

  const res = await authFetch("/history/" + user);
  const data = await safeJson(res);

  const box = document.getElementById("history");
  box.innerHTML = "";

  (data.history || []).forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerText = item.summary || "-";
    box.appendChild(div);
  });
}
</script>
</body>
</html>
