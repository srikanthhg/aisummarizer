name: frontend app

on:
  workflow_dispatch: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
    - 'charts/frontend/**'


permissions:
  contents: write   # required to push to CD repo with GITHUB_TOKEN or PAT
  
env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' 

  gitleaks-scan:
    runs-on: ubuntu-latest
    needs: compile
    steps:
