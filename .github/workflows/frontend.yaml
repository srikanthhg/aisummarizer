  build_frontend_docker_image_and_push:
    runs-on: ubuntu-latest
    # needs: dependency-check
    needs: gitleaks-scan
    # permissions:
    #   packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: srikanthhg
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image (frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ github.repository_owner }}/aisummarizerfrontend:${{ env.IMAGE_TAG }}
  trivy_image_scan:
    runs-on: ubuntu-latest
    needs:
      - build_frontend_docker_image_and_push
    steps:
      - name: Checkout (noop, keeps workspace consistent)
        uses: actions/checkout@v4

      - name: Run Trivy image scan for frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ github.repository_owner }}/aisummarizerfrontend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
  update-image-tag-in-frontend-helm-chart:
    runs-on: ubuntu-latest
    needs:
      - trivy_image_scan
    steps:
      - name: Checkout (noop, keeps workspace consistent)
        uses: actions/checkout@v6
       
      - name: Update frontend image tag
        run: |
          ls -la
          sed -i "s|^\([[:space:]]*tag:[[:space:]]*\).*|\1\"${IMAGE_TAG}\"|" charts/frontend/values.yaml
          echo "Updated lines:"
          grep -n "tag:" charts/frontend/values.yaml
      
      - name: Commit and push changes
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          git add charts/frontend/values.yaml
          git diff --cached --quiet || git commit -m "updated frontend image tag"
          git push